aid: chemius
name: Chemius
x-type: company
description: >-
  Chemius is a cloud-based chemical compliance platform that automates Safety
  Data Sheet (SDS), Technical Data Sheet (TDS), and regulatory label creation
  in 38+ languages for organizations handling chemical products. The platform
  exposes an API suite covering SDS, TDS, ADR transport documentation, ERP
  integration, labels, web shop product data, and PDF generation, and offers
  AI-assisted authoring through the Chemius AI SDS assistant. Chemius is
  hosted in DIN ISO/IEC 27001-certified German data centers and supports
  CLP 1272/2008, REACH 1907/2006, detergents, aerosols, and US OSHA / GHS
  regulatory frameworks.
